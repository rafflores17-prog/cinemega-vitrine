<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocando: {{ titulo }}</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .plyr { width: 100%; max-width: 100%; height: 100vh; }
        .voltar { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); color: #fff; padding: 10px; border-radius: 5px; text-decoration: none; font-family: sans-serif; font-size: 12px; }
    </style>
</head>
<body>
    <a href="javascript:window.close()" class="voltar">✕ FECHAR PLAYER</a>
    <video id="player" playsinline controls autoplay>
        <source src="{{ link_video }}" type="video/mp4" />
    </video>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>const player = new Plyr('#player');</script>
</body>
</html>
