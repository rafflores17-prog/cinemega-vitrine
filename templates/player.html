<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Mega Player - {{ titulo }}</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .plyr { width: 100%; height: 100vh; }
        .fechar { position: absolute; top: 20px; right: 20px; z-index: 99; background: rgba(255,0,0,0.7); color: #fff; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="fechar">✕ FECHAR</a>
    <video id="player" playsinline controls autoplay>
        <source src="{{ link_video }}" type="video/mp4" />
    </video>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>const player = new Plyr('#player');</script>
</body>
</html>
