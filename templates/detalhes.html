{% if play_link %}
        <div class="player-box">
            <div class="aviso-play">🍿 Toque para o Play</div>
            <video id="player" controls playsinline 
                   poster="{{ bg }}{{ filme.backdrop_path }}" 
                   preload="metadata" 
                   crossorigin="anonymous">
                <source src="{{ play_link }}" type="video/mp4">
            </video>
        </div>
        <a href="{{ play_link }}" target="_blank" class="btn-externo">📲 PLAYER EXTERNO / DOWNLOAD</a>
    {% else %}
        <div class="btn-externo" style="background:#222;">🎬 EM MANUTENÇÃO</div>
    {% endif %}
