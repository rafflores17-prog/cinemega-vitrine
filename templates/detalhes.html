<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>{{ filme.title }} - {{ nome_site }}</title>

<script>
(function(s){
s.dataset.zone='10920011',
s.src='https://n6wxm.com/vignette.min.js'
})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<style>
/* 🔒 BLOQUEIO TOTAL E TRAVA DE LAYOUT */
* { 
    -webkit-touch-callout: none !important; /* Trava menu no iOS e Chrome */
    -webkit-user-select: none !important; 
    -khtml-user-select: none !important; 
    -moz-user-select: none !important; 
    -ms-user-select: none !important; 
    user-select: none !important; 
    -webkit-tap-highlight-color: transparent; 
    box-sizing: border-box; 
    -webkit-user-drag: none !important; /* Impede arrastar imagens */
}

html, body { 
    margin: 0; 
    padding: 0; 
    background: #000; 
    color: #fff; 
    font-family: sans-serif; 
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    position: relative;
    /* Bloqueio extra para UC e navegadores antigos */
    -webkit-perspective: 1000;
    -webkit-backface-visibility: hidden;
}

.fundo-animado {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: url('{{ bg }}{{ filme.backdrop_path }}') center/cover;
    filter: blur(25px) brightness(0.2);
    z-index: -1;
    animation: movimentoFundo 20s infinite alternate linear;
}

@keyframes movimentoFundo { from { transform: scale(1); } to { transform: scale(1.1); } }

.container { 
    padding: 15px; 
    width: 100%;
    max-width: 800px;
    margin: 0 auto; 
    text-align: center; 
}

/* 🖼️ PROTEÇÃO DE IMAGEM CONTRA CLIQUE LONGO */
.capinha, .card-rel img {
    width: 170px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    margin: 45px auto 10px auto; display: block; border: 1px solid rgba(255,255,255,0.2);
    pointer-events: none !important; /* Bloqueia interação do mouse/toque */
    -webkit-user-drag: none;
}

.back-btn { 
    background: #e50914; color: #fff; text-decoration: none; font-size: 13px; 
    font-weight: bold; float: left; margin-bottom: 15px; padding: 8px 16px; 
    border-radius: 6px; box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4);
}

.player-box {
    width: 100%; max-width: 700px; aspect-ratio: 16/9; background: #000; border-radius: 12px;
    margin: 10px auto; overflow: hidden; border: 1px solid #333; position: relative;
}

.aviso-play {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: #ffcc00; color: #000; padding: 6px 18px; border-radius: 25px;
    font-size: 12px; font-weight: bold; z-index: 5; pointer-events: none; 
    box-shadow: 0 0 15px #ffcc00; animation: pulsar 1.5s infinite;
}

@keyframes pulsar { 0% { opacity: 0.8; transform: translateX(-50%) scale(1); } 50% { opacity: 1; transform: translateX(-50%) scale(1.05); } 100% { opacity: 0.8; transform: translateX(-50%) scale(1); } }

.btn-secundario {
    display: block; width: 100%; max-width: 400px; padding: 15px;
    background: #007bff; color: #fff; text-decoration: none; border-radius: 50px;
    font-weight: bold; font-size: 15px; margin: 15px auto; border: none; 
    text-align: center; box-shadow: 0 4px 15px rgba(0,123,255,0.3);
}

.sinopse-box {
    background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; text-align: justify;
    font-size: 15px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); margin: 25px auto;
}

.grid-relacionados { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (min-width: 768px) { .grid-relacionados { grid-template-columns: repeat(6, 1fr); } }

.card-rel img { width: 100%; margin: 0; }
</style>
</head>

<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

<div class="fundo-animado"></div>

<div class="container">
    <a href="/" class="back-btn">⬅ VOLTAR</a>
    <div style="clear: both;"></div>

    <img src="{{ img }}{{ filme.poster_path }}" class="capinha">

    <h1 style="font-size: 28px; margin: 10px 0 5px 0; font-weight: 900;">{{ filme.title }}</h1>

    <div class="info-topo" style="color: #00ff88; font-weight: bold; font-size: 13px; margin-bottom: 15px;">
        ⭐ {{ "%.1f"|format(filme.vote_average) }} | {{ filme.release_date[:4] }} | FULL HD
    </div>

    {% if trailer_key %}
        <div class="player-box">
            <iframe src="https://www.youtube.com/embed/{{ trailer_key }}?rel=0&playsinline=1" allowfullscreen></iframe>
        </div>
    {% endif %}

    <div class="player-box">
        <div class="aviso-play">🍿 Clique aqui para assistir</div>
        <video id="player" controls playsinline poster="{{ bg }}{{ filme.backdrop_path }}" controlsList="nodownload">
            <source src="{{ play_link }}" type="video/mp4">
        </video>
    </div>
    
    <a href="{{ play_link }}" target="_blank" class="btn-secundario">📲 ABRIR NO PLAYER EXTERNO</a>

    <div class="sinopse-box">
        <span style="display:block; color:#ffcc00; font-size:11px; text-transform:uppercase; margin-bottom:10px;">Sinopse</span>
        {{ filme.overview or "Sinopse indisponível." }}
    </div>

    <h2 style="text-align:left; font-size:18px; margin-top:30px;">🔥 Filmes Semelhantes</h2>
    <div class="grid-relacionados" id="relacionados-grid"></div>
</div>

<script>
// 🔨 MARRETADA PARA UC BROWSER E OUTROS
function travarTudo() {
    // Bloqueia clique longo em imagens e links
    document.querySelectorAll('img, a').forEach(el => {
        el.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});
        
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    });
}

// Bloqueia atalhos de teclado (PC)
document.onkeydown = function(e) {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
};

// Executa a trava
setInterval(travarTudo, 1000); 

async function carregarRelacionados() {
    try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/{{ filme.id }}/similar?api_key=c90fb79a2f7d756a49bee848bce5f413&language=pt-BR`);
        const data = await res.json();
        const grid = document.getElementById('relacionados-grid');
        grid.innerHTML = '';
        data.results.slice(0, 12).forEach(item => {
            if(item.poster_path) {
                grid.innerHTML += `
                    <a href="/filme/${item.id}" class="card-rel" style="text-decoration:none; color:#bbb; font-size:10px;">
                        <img src="https://image.tmdb.org/t/p/w200${item.poster_path}" style="width:100%; border-radius:10px; border:1px solid #222;">
                        <span style="display:block; margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</span>
                    </a>
                `;
            }
        });
    } catch(e) {}
}
carregarRelacionados();
</script>

<script>
(function(s){
s.dataset.zone='10920008',
s.src='https://nap5k.com/tag.min.js'
})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

</body>
</html>
