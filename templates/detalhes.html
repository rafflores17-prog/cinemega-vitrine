<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ filme.title }} - Cine Mega</title>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
.fundo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://image.tmdb.org/t/p/original{{ filme.backdrop_path }}') center/cover; filter: blur(25px) brightness(0.2); z-index: -1; }
.container { padding: 15px; max-width: 600px; margin: 0 auto; text-align: center; }
.back-btn { background: #e50914; color: #fff; text-decoration: none; font-size: 13px; font-weight: bold; float: left; padding: 8px 24px; border-radius: 50px; }
.capinha { width: 150px; border-radius: 10px; margin: 40px auto 10px; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.meta { font-size: 12px; color: #ccc; margin-bottom: 20px; }
.player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
.btn-play-ext { display: block; width: 100%; padding: 15px; background: #007bff; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; margin: 10px 0; }
.sinopse { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; text-align: justify; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="fundo"></div>
<div class="container">
    <a href="/" class="back-btn">⬅ VOLTAR</a>
    <img src="https://image.tmdb.org/t/p/w500{{ filme.poster_path }}" class="capinha">
    <h1>{{ filme.title }}</h1>
    <div class="meta">⭐ {{ filme.vote_average }} | {{ filme.release_date[:4] }}</div>

    {% if play_link %}
        <div class="player-box">
            <video id="vid" controls playsinline preload="none" style="width:100%; height:100%;">
                <source src="{{ play_link }}" type="video/mp4">
            </video>
        </div>
        <a href="{{ play_link }}" target="_blank" class="btn-play-ext">📲 ABRIR NO PLAYER EXTERNO / DOWNLOAD</a>
    {% else %}
        <div class="player-box" style="display:flex; align-items:center; justify-content:center; color:#666;">🎬 FILME EM MANUTENÇÃO</div>
    {% endif %}

    <div class="sinopse">
        <strong>Sinopse:</strong><br>
        {{ filme.overview or "Sinopse não disponível." }}
    </div>
</div>
</body>
</html>
