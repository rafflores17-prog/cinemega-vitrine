<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ filme.title }} - Cine Mega</title>

<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
    .fundo-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('{{ bg }}{{ filme.backdrop_path }}') center/cover; filter: blur(20px) brightness(0.2); z-index: -1; }
    .container { padding: 15px; max-width: 600px; margin: 0 auto; text-align: center; }
    .header-top { width: 100%; text-align: left; margin-bottom: 10px; }
    .back-btn { background: #e50914; color: #fff; text-decoration: none; font-size: 13px; font-weight: bold; padding: 8px 16px; border-radius: 6px; display: inline-block; }
    .capinha { width: 140px; border-radius: 12px; margin: 20px auto 10px; display: block; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 20px #000; }
    h1 { font-size: 22px; margin: 10px 0; font-weight: bold; }
    .player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 15px 0; overflow: hidden; border: 1px solid #333; position: relative; }
    #camada-vidro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9; background: rgba(0,0,0,0.7); cursor: pointer; }
    .btn-play-red { background: #e50914; color: #fff; padding: 12px 25px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 0 15px #e50914; }
    .botoes-externos { display: flex; gap: 10px; margin: 15px 0; }
    .btn-ext { flex: 1; padding: 14px; color: #fff; border: none; border-radius: 50px; font-weight: bold; font-size: 12px; cursor: pointer; }
    .sinopse-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; text-align: justify; font-size: 13px; border: 1px solid #333; line-height: 1.6; }
    .row-titulo { text-align: left; color: #ffcc00; font-weight: bold; margin: 25px 0 10px; font-size: 15px; border-left: 4px solid #e50914; padding-left: 10px; }
    .rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 30px; }
    .rec-card img { width: 100%; border-radius: 8px; border: 1px solid #222; }
</style>
</head>
<body>
<div class="fundo-backdrop"></div>
<div class="container">
    <div class="header-top"><a href="/" class="back-btn">⬅ VOLTAR</a></div>
    <img src="{{ img }}{{ filme.poster_path }}" class="capinha">
    <h1>{{ filme.title }}</h1>
    <div style="color: #ffcc00; font-size: 13px; font-weight: bold; margin-bottom: 15px;">⭐ {{ nota }} | {{ filme.release_date[:4] }} | {{ duracao }}</div>

    <div class="player-box">
        <div id="camada-vidro" onclick="abrirJanelaPlayer()">
            <div class="btn-play-red">ASSISTIR AGORA 🍿</div>
            <p style="font-size: 10px; margin-top: 10px; color: #aaa;">(Abre em player flutuante anti-travamento)</p>
        </div>
        <video id="meu-player" poster="{{ bg }}{{ filme.backdrop_path }}" style="width:100%; height:100%;"></video>
    </div>
    
    <div class="botoes-externos">
        <button onclick="abrirVLC()" class="btn-ext" style="background: #FF8800;">🟠 VLC PLAYER</button>
        <button onclick="abrirMX()" class="btn-ext" style="background: #0052D4;">🔵 MX PLAYER</button>
    </div>

    <div class="sinopse-box">
        <strong style="color:#ffcc00; font-size:11px; text-transform:uppercase;">Sinopse</strong><br>
        {{ filme.overview or "Sinopse não disponível." }}
    </div>

    <div class="row-titulo">🎬 RECOMENDADOS</div>
    <div class="rec-grid">
        {% for rec in recomendados %}
        <a href="/filme/{{ rec.id }}" class="rec-card"><img src="{{ img }}{{ rec.poster_path }}"></a>
        {% endfor %}
    </div>
</div>

<script>
// FUNÇÃO PARA ABRIR O VÍDEO EM JANELA SEPARADA (EVITA CRASH DO CHROME)
function abrirJanelaPlayer() {
    let urlVideo = "{{ play_link }}";
    let width = 720;
    let height = 405;
    let left = (screen.width - width) / 2;
    let top = (screen.height - height) / 2;
    
    // Abre o vídeo numa aba que o Chrome não bloqueia por "Mixed Content"
    window.open(urlVideo, 'CineMegaPlayer', 
        `width=${width},height=${height},top=${top},left=${left},toolbar=no,menubar=no,status=no,location=no,resizable=yes`);
}

// FUNÇÕES DE INTENT CORRIGIDAS
function abrirVLC() {
    let urlOriginal = "{{ play_link }}";
    // Força o intent a ignorar a segurança do Chrome e abrir o app direto
    let urlLimpa = urlOriginal.replace('https://', '').replace('http://', '');
    window.location.href = `intent://${urlLimpa}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=org.videolan.vlc;S.browser_fallback_url=${encodeURIComponent(urlOriginal)};end`;
}

function abrirMX() {
    let urlOriginal = "{{ play_link }}";
    let urlLimpa = urlOriginal.replace('https://', '').replace('http://', '');
    window.location.href = `intent://${urlLimpa}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=com.mxtech.videoplayer.ad;S.browser_fallback_url=${encodeURIComponent(urlOriginal)};end`;
}
</script>
</body>
</html>
