<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filme.title }} - Cine Mega</title>

<style>
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
.container { padding: 15px; max-width: 600px; margin: auto; text-align: center; }
.capinha { width: 150px; border-radius: 10px; margin: 20px auto; display: block; }
.player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; margin: 15px 0; }
video, iframe { width: 100%; height: 100%; }
.btn { padding: 10px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
.vlc { background: orange; }
.mx { background: blue; color: #fff; }
</style>

</head>
<body>

<div class="container">

<a href="/" style="background:red;padding:10px;border-radius:5px;text-decoration:none;color:#fff;">⬅ VOLTAR</a>

<img src="{{ img }}{{ filme.poster_path }}" class="capinha">
<h2>{{ filme.title }}</h2>

<div>⭐ {{ nota }} | {{ filme.release_date[:4] }} | {{ duracao }}</div>

<!-- PLAYER -->
<div class="player-box">
    <video controls playsinline preload="metadata">
        <source src="{{ play_link }}" type="video/mp4">
    </video>
</div>

<!-- BOTÕES -->
<button class="btn vlc" onclick="abrirVLC()">Abrir no VLC</button>
<button class="btn mx" onclick="abrirMX()">Abrir no MX Player</button>

<!-- TRAILER -->
{% if trailer_key %}
<h3>🎬 Trailer</h3>
<div class="player-box">
    <iframe src="https://www.youtube.com/embed/{{ trailer_key }}"></iframe>
</div>
{% endif %}

<!-- SINOPSE -->
<h3>📖 Sinopse</h3>
<p>{{ filme.overview }}</p>

<!-- RECOMENDADOS -->
<h3>🔥 Você pode gostar</h3>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
{% for rec in recomendados %}
<a href="/filme/{{ rec.id }}">
<img src="{{ img }}{{ rec.poster_path }}" style="width:100%;">
</a>
{% endfor %}
</div>

</div>

<script>
function abrirVLC() {
    let url = "{{ play_link }}";
    window.location.href = "intent://" + url.replace("https://","") + "#Intent;package=org.videolan.vlc;end";
}

function abrirMX() {
    let url = "{{ play_link }}";
    window.location.href = "intent://" + url.replace("https://","") + "#Intent;package=com.mxtech.videoplayer.ad;end";
}
</script>

</body>
</html>
