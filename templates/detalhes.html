<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ filme.title }} - Cine Mega</title>

<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }

.fundo-backdrop {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('{{ bg }}{{ filme.backdrop_path }}') center/cover;
    filter: blur(20px) brightness(0.2);
    z-index: -1;
}

.container { padding: 15px; max-width: 600px; margin: 0 auto; text-align: center; }

.back-btn {
    background: #e50914;
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 6px;
}

.capinha {
    width: 140px;
    border-radius: 12px;
    margin: 20px auto 10px;
    display: block;
    border: 1px solid rgba(255,255,255,0.2);
}

h1 { font-size: 22px; margin: 10px 0; }

.player-box {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 12px;
    margin: 15px 0;
    overflow: hidden;
    border: 1px solid #333;
    position: relative;
}

video {
    width: 100%;
    height: 100%;
}

#camada-vidro {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9;
    background: rgba(0,0,0,0.6);
    cursor: pointer;
}

.btn-play-red {
    background: #e50914;
    color: #fff;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: bold;
}

.msg-erro {
    color: #ff4444;
    font-size: 13px;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="fundo-backdrop"></div>

<div class="container">

    <a href="/" class="back-btn">⬅ VOLTAR</a>

    <img src="{{ img }}{{ filme.poster_path }}" class="capinha">
    <h1>{{ filme.title }}</h1>

    <div style="color:#ffcc00; font-size:13px; margin-bottom:10px;">
        ⭐ {{ nota }} | {{ filme.release_date[:4] }} | {{ duracao }}
    </div>

    <!-- PLAYER -->
    <div class="player-box">

        {% if play_link %}
        <div id="camada-vidro" onclick="iniciarVideo()">
            <div class="btn-play-red">ASSISTIR AGORA 🍿</div>
        </div>

        <video id="player" controls playsinline poster="{{ bg }}{{ filme.backdrop_path }}">
            <source src="{{ play_link }}" type="video/mp4">
        </video>
        {% else %}
        <div style="display:flex;align-items:center;justify-content:center;height:100%;">
            <div class="msg-erro">❌ Filme não encontrado na base</div>
        </div>
        {% endif %}

    </div>

</div>

<script>
function iniciarVideo(){
    document.getElementById("camada-vidro").style.display = "none";
    document.getElementById("player").play();
}
</script>

</body>
</html>
