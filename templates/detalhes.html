<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>{{ filme.title }} - {{ nome_site }}</title>

<link rel="stylesheet"
href="https://cdn.plyr.io/3.7.8/plyr.css" />

<script
src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js">
</script>

{% if mostrar_ads %}

<!-- ANÚNCIO 1 -->

<script>
(function(s){
s.dataset.zone='10920011',
s.src='https://n6wxm.com/vignette.min.js'
})
(document.body.appendChild(
document.createElement('script')));
</script>

{% endif %}

<style>
* {
-webkit-tap-highlight-color: transparent;
box-sizing: border-box;
}

body {
margin: 0;
background: #000;
color: #fff;
font-family: 'Segoe UI', Roboto, sans-serif;
overflow-x: hidden;
}

.fundo {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background:
url('{{ bg }}{{ filme.backdrop_path }}')
center/cover;
filter:
blur(25px)
brightness(0.2);
z-index: -1;
}

.container {
padding: 15px;
max-width: 800px;
margin: 0 auto;
text-align: center;
}

.back-btn {
background: #e50914;
color: #fff;
text-decoration: none;
font-size: 13px;
font-weight: bold;
float: left;
padding: 10px 20px;
border-radius: 50px;
}

.capinha {
width: 140px;
border-radius: 12px;
margin: 50px auto 15px;
display: block;
box-shadow:
0 10px 30px
rgba(0,0,0,0.8);
}

.player-wrapper {
margin: 20px 0;
border-radius: 15px;
overflow: hidden;
box-shadow:
0 20px 50px
rgba(0,0,0,0.9);
border: 1px solid #222;
background: #000;
}

.btn-externo {
display: block;
width: 100%;
padding: 16px;
background:
linear-gradient(
45deg,
#222,
#333);
color: #fff;
text-decoration: none;
border-radius: 12px;
font-weight: bold;
margin: 20px 0;
font-size: 14px;
border: 1px solid #444;
}

.rec-grid {
display: grid;
grid-template-columns:
repeat(3, 1fr);
gap: 12px;
margin-top: 20px;
}

.rec-card {
text-decoration: none;
color: #fff;
font-size: 11px;
}

.rec-card img {
width: 100%;
border-radius: 10px;
margin-bottom: 8px;
}
</style>

</head>

<body>

<div class="fundo"></div>

<div class="container">

<a href="/" class="back-btn">
⬅ VOLTAR
</a>

<img
src="{{ img }}{{ filme.poster_path }}"
class="capinha">

<!-- PLAYER -->

<div class="player-wrapper">

<video
id="player"
playsinline
muted
controls
preload="metadata"
crossorigin="anonymous"
data-poster="{{ bg }}{{ filme.backdrop_path }}">

<source
src="{{ play_link }}"
type="video/mp4">

{% if legenda_link %}

<track
kind="subtitles"
src="{{ legenda_link }}"
srclang="pt"
label="Português"
default>

{% endif %}

</video>

</div>

<a
href="{{ play_link }}"
target="_blank"
class="btn-externo"
onclick="abrirAdExterno()">

📲 ABRIR NO PLAYER EXTERNO (VLC/MX)

</a>

<!-- TRAILER -->

{% if trailer %}

<div class="player-wrapper">

<iframe
width="100%"
height="220"
src="https://www.youtube.com/embed/{{ trailer }}"
frameborder="0"
allowfullscreen>

</iframe>

</div>

{% endif %}

<!-- RECOMENDADOS -->

<div style="margin-top: 40px; text-align: left;">

<h3 style="
font-size: 18px;
color: #fff;
margin-bottom: 15px;
border-left: 4px solid #e50914;
padding-left: 10px;">

🍿 VOCÊ PODE GOSTAR:

</h3>

<div class="rec-grid">

{% for rec in recomendados %}

<a
href="/filme/{{ rec.id }}"
class="rec-card">

<img
src="{{ img }}{{ rec.poster_path }}">

<p style="text-align:center;">

{{ rec.title[:15] }}...

</p>

</a>

{% endfor %}

</div>

</div>

</div>

<script>

const player =
new Plyr('#player');

/* POPUP AO DAR PLAY */

let anuncioDisparado = false;

document
.getElementById('player')
.addEventListener(
"play",
function(){

if(!anuncioDisparado){

anuncioDisparado = true;

(function(s){

s.dataset.zone='10920000',
s.src='https://al5sm.com/tag.min.js'

})
(document.body.appendChild(
document.createElement('script')));

}

});

/* ANÚNCIO APÓS 15s */

setTimeout(function(){

(function(s){

s.dataset.zone='10920008',
s.src='https://nap5k.com/tag.min.js'

})
(document.body.appendChild(
document.createElement('script')));

},15000);

function abrirAdExterno(){

(function(s){

s.dataset.zone='10920000',
s.src='https://al5sm.com/tag.min.js'

})
(document.body.appendChild(
document.createElement('script')));

}

</script>

</body>
</html>
