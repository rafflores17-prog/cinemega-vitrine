    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #e50914, #000); }
        .busca-box { padding: 10px; text-align: center; }
        input { padding: 10px; width: 70%; border-radius: 20px; border: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { text-decoration: none; color: #fff; font-size: 11px; text-align: center; }
        .card img { width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { font-size: 16px; margin-left: 15px; color: #ffcc00; border-left: 4px solid #e50914; padding-left: 10px; }

<body oncontextmenu="return false;">
    <div class="header">
        <h1 style="margin:0;">{{ nome_site }}</h1>
    </div>

    <div class="busca-box">
        <form action="/" method="get">
            <input type="text" name="q" placeholder="Pesquisar filme...">
        </form>
    </div>

    {% if busca %}
        <h2>{{ titulo_busca }}</h2>
        <div class="grid">
            {% for f in filmes %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}" alt="{{ f.title }}">
                    <p>{{ f.title[:15] }}...</p>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <h2>🔥 POPULARES</h2>
        <div class="grid">
            {% for f in populares %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title[:15] }}...</p>
                </a>
            {% endfor %}
        </div>

        <h2>🤣 COMÉDIA</h2>
        <div class="grid">
            {% for f in comedia %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title[:15] }}...</p>
                </a>
            {% endfor %}
        </div>
    {% endif %}
