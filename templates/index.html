    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #e5091444, #000); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { text-decoration: none; color: #fff; font-size: 11px; text-align: center; }
        .card img { width: 100%; border-radius: 10px; border: 1px solid #333; }
        h2 { font-size: 16px; margin: 20px 0 10px 15px; color: #ffcc00; border-left: 4px solid #e50914; padding-left: 10px; }
        .busca-box { padding: 10px; text-align: center; }
        .busca-box input { padding: 12px; width: 80%; border-radius: 50px; border: none; background: #111; color: #fff; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="header">
        <h1 style="color: #e50914;">{{ nome_site }}</h1>
        <div class="busca-box">
            <form action="/" method="get">
                <input type="text" name="q" placeholder="Pesquisar filmes...">
            </form>
        </div>
    </div>

    {% if busca %}
        <h2>{{ titulo_busca }}</h2>
        <div class="grid">
            {% for f in filmes %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <h2>🔥 POPULARES</h2>
        <div class="grid">
            {% for f in populares %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>

        <h2>🤣 COMÉDIA</h2>
        <div class="grid">
            {% for f in comedia %}
                <a href="/filme/{{ f.id }}" class="card">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>
    {% endif %}
</body>
</html>
