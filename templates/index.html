    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; padding-top: 140px; }
        
        /* 💎 BARRA FIXA COM LOGO E BUSCA */
        .header-fixo { position: fixed; top: 0; left: 0; width: 100%; background: #000; z-index: 100; padding: 10px 0; border-bottom: 1px solid #111; }
        .logo { font-size: 24px; font-weight: bold; color: #e50914; text-align: center; text-transform: uppercase; margin-bottom: 8px; }
        .busca-box { padding: 0 15px; max-width: 600px; margin: 0 auto 10px; }
        .busca-box input { width: 100%; padding: 10px 18px; border-radius: 8px; border: 1px solid #222; background: #111; color: #fff; outline: none; }

        /* 🏷️ BOTÕES DE CATEGORIA REDONDOS */
        .cat-row { display: flex; overflow-x: auto; padding: 5px 15px 15px; gap: 8px; scrollbar-width: none; }
        .cat-row::-webkit-scrollbar { display: none; }
        .btn-cat { background: #1a1a1a; color: #fff; padding: 7px 15px; border-radius: 20px; text-decoration: none; font-size: 13px; border: 1px solid #333; white-space: nowrap; }
        .btn-cat.active { background: #e50914; border-color: #e50914; }

        /* 🎬 BANNER DESTAQUE COM BOTÃO VERMELHO */
        .banner { width: 100%; height: 210px; position: relative; overflow: hidden; margin-bottom: 25px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 20px; transition: 0.5s; }
        .btn-assistir { background: #e50914; color: #fff; padding: 10px 22px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3); }

        /* ↔️ SLIDERS HORIZONTAIS */
        .row-titulo { font-size: 16px; color: #ffcc00; margin: 10px 15px; font-weight: bold; }
        .slider-row { display: flex; overflow-x: auto; padding: 0 15px 25px; gap: 12px; scrollbar-width: none; }
        .slider-row::-webkit-scrollbar { display: none; }
        .capa { min-width: 105px; text-decoration: none; color: #fff; }
        .capa img { width: 105px; height: 155px; border-radius: 10px; border: 1px solid #222; object-fit: cover; }
        .capa p { font-size: 10px; margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 🔳 GRADE DE BUSCA (3 COLUNAS) */
        .busca-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
    </style>
</head>
<body>

    <div class="header-fixo">
        <div class="logo">Cine Mega</div>
        <div class="busca-box">
            <form action="/" method="get">
                <input type="text" name="q" placeholder="Pesquisar..." value="{{ q or '' }}">
            </form>
        </div>
        <div class="cat-row">
            <a href="/" class="btn-cat {% if not busca %}active{% endif %}">Início</a>
            <a href="/genero/28/Ação" class="btn-cat">Ação</a>
            <a href="/genero/35/Comédia" class="btn-cat">Comédia</a>
            <a href="/genero/27/Terror" class="btn-cat">Terror</a>
            <a href="/genero/16/Animação" class="btn-cat">Animação</a>
        </div>
    </div>

    {% if busca %}
        <div class="row-titulo">🔍 RESULTADOS</div>
        <div class="busca-grid">
            {% for f in filmes %}
                <a href="/filme/{{ f.id }}" class="capa">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div id="banner-rotativo" class="banner">
            <a href="#" id="btn-banner" class="btn-assistir">ASSISTIR AGORA</a>
        </div>

        <div class="row-titulo">🔥 MAIS ASSISTIDOS</div>
        <div class="slider-row">
            {% for f in populares %}
                <a href="/filme/{{ f.id }}" class="capa">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>

        <div class="row-titulo">🤣 COMÉDIA</div>
        <div class="slider-row">
            {% for f in comedia %}
                <a href="/filme/{{ f.id }}" class="capa">
                    <img src="{{ img }}{{ f.poster_path }}">
                    <p>{{ f.title }}</p>
                </a>
            {% endfor %}
        </div>
    {% endif %}

    <script>
        // Lógica do Banner que fica mudando
        const destaques = [
            {% for f in destaques %}
            { id: "{{ f.id }}", img: "{{ bg }}{{ f.backdrop_path }}" },
            {% endfor %}
        ];
        let index = 0;
        function mudarBanner() {
            if(destaques.length === 0) return;
            const b = document.getElementById('banner-rotativo');
            const link = document.getElementById('btn-banner');
            b.style.backgroundImage = `linear-gradient(to top, #000, transparent), url('${destaques[index].img}')`;
            link.href = `/filme/${destaques[index].id}`;
            index = (index + 1) % destaques.length;
        }
        setInterval(mudarBanner, 5000);
        mudarBanner();

        // Popunder no clique
        document.body.onclick = function() {

</body>
</html>
