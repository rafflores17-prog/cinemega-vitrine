<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ nome_site }}</title>
    
    <meta name="description" content="Cine Mega - Assista aos melhores filmes online grátis em Full HD. Lançamentos, ação, comédia e muito mais direto no seu celular.">
    <meta name="keywords" content="filmes online, assistir filmes, cinema, cine mega, filmes gratis, lançamentos">
    <meta name="robots" content="index, follow">
    <meta name="clckd" content="5c83dac11e09aed23035106950017f4a" />

    <style>
        /* TRAVAS DE SEGURANÇA */
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        input { -webkit-user-select: text !important; user-select: text !important; }

        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* TOPO FIXO (CINE MEGA + BUSCA) */
        .topo-fixo {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e50914;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.3);
        }

        .header { padding: 12px; text-align: center; }
        .header h1 { 
            color: #e50914; 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }
        
        .search-container { padding: 10px 15px 15px 15px; text-align: center; }
        
        /* BARRA DE PESQUISA APRESENTÁVEL */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: #111;
            border: 1px solid #333;
            border-radius: 50px;
            padding: 2px 15px;
            transition: 0.3s;
        }
        .search-box:focus-within {
            border-color: #e50914;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.2);
        }
        .search-box i { color: #888; font-size: 18px; margin-right: 10px; }
        
        .search-input { 
            width: 100%; 
            padding: 12px 5px; 
            background: transparent; 
            border: none; 
            color: #fff; 
            outline: none; 
            font-size: 16px; 
        }

        /* ESPAÇO PARA O CONTEÚDO NÃO FICAR EMBAIXO DO TOPO FIXO */
        .content-wrapper { margin-top: 140px; }

        /* GRID 2 COLUNAS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; position: relative; transition: 0.2s; }
        .card:active { transform: scale(0.96); }
        .card img { width: 100%; display: block; pointer-events: none; }
        .card-title { 
            padding: 10px; 
            font-size: 13px; 
            text-align: center; 
            font-weight: bold; 
            height: 35px; 
            overflow: hidden; 
            background: linear-gradient(to top, #000, transparent);
        }
        
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="topo-fixo">
        <div class="header">
            <h1>{{ nome_site }}</h1>
        </div>

        <div class="search-container">
            <form action="/">
                <div class="search-box">
                    <span>🔍</span> <input type="text" name="q" class="search-input" placeholder="O que vamos assistir hoje?">
                </div>
            </form>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="grid">
            {% for filme in filmes %}
            <a href="/filme/{{ filme.id }}" class="card">
                <img src="{{ img }}{{ filme.poster_path }}">
                <div class="card-title">{{ filme.title }}</div>
            </a>
            {% endfor %}
        </div>
    </div>

</body>
</html>
